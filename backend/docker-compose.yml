version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: crochet_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: crochet_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - crochet_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: .
    container_name: crochet_backend
    environment:
      DEBUG: "True"
      ENVIRONMENT: "development"
      MONGODB_URL: "mongodb://admin:password123@mongodb:27017/crochet_db?authSource=admin"
      DATABASE_NAME: "crochet_db"
      SECRET_KEY: "your-super-secret-jwt-key-change-in-production"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      OPENAI_API_KEY: "${OPENAI_API_KEY:-sk-test}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-test}"
      CLAUDE_API_KEY: "${CLAUDE_API_KEY:-test}"
      AI_PROVIDER: "openai"
      FRONTEND_URL: "http://localhost:5173"
      ADMIN_FRONTEND_URL: "http://localhost:5173"
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - crochet_network
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:

networks:
  crochet_network:
    driver: bridge
